name: Scraper health

on:
  schedule:
    # Daily at 06:00 UTC (07:00–08:00 CET) — early enough to see the
    # email notification at the start of the workday.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  live:
    name: Live scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: pip install -r requirements_test.txt
      - name: Run live tests against real App Store / Google Play
        run: pytest -m live -v
