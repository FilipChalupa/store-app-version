[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long — formatter handles this
    "SIM108", # ternary instead of if/else — sometimes less readable
    "RUF001", # ambiguous unicode chars — we deliberately handle Cyrillic, en/em dash, etc.
    "RUF002", # same in docstrings
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
"scripts/*" = ["T201"]
